<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatWX</title>
<link rel="stylesheet" type="text/css" href="static/style.css">
<script src="static/script.js"></script>
</head>
<body>
 <base target="_self">

 <div id="ctrl">
  <button id="username">{{ .Name }}</button>
  <button id="open" onclick="style='display':'none'">Join</button> 
  <button id="close">Exit</button>
 </div>
 
 <div id="chat">
   <div id="person">all</div>
   <div id="usermenu"></div>
   <div id="board"><textarea id="input" value=""></textarea></div>
   <div id="embed">
     <form id="content" method="post" enctype="multipart/form-data">
     <input type="file" id="input_file" name="files" multiple style="display:none">
     <label for="input_file">&#128206;</label>
     </form>
   </div>
   <button id="send">Send</button>

 
    <div id="show">
    <a href='https://{{.Addr}}/saved?user={{.Name}}' target='_blank'>Show saved</a>
    </div>
 
  <div id="output"></div>
 </div>
</body>
</html>
