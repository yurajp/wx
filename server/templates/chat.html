<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatWS</title>
<link rel="stylesheet" type="text/css" href="static/css/style.css">
<script src="static/js/script.js"></script>
<link rel="icon" type="image/png" href="static/favicon.png">
</head>
<body>
 <base target="_self">
 <div id="uname">{{ .Name }}</div>
 <div id="ctrl">
  <div id="profile">
    <a href='https://{{.Addr}}/saved?user={{.Name}}' target='_blank'>
    <div id="circle">
      <img id="avatar" src='{{ .Avatar }}' target="avatar"></div>
    </a>
    <div id="username">{{ .Name }}</div>
  </div>
  <button id="open" onclick="style='display':none">Join</button> 
  <button id="close">Exit</button>
 </div>
 
 <div id="chat">
   <div id="person">All</div>
   <div id="usermenu"></div>
   <div id="board"><textarea id="input" value=""></textarea></div>
   <div id="embed">
     <form id="content" method="post" enctype="multipart/form-data">
     <input type="file" id="input_file" name="files" style="display:none">
     <label for="input_file">&#128206;</label>
     </form>
   </div>
   <button id="send">Send</button>

   <div id="output"></div>
 </div>
</body>
</html>
